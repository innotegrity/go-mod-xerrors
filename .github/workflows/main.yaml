name: Test and Analyze 'main' Branch

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # project specific variables
  SONARQUBE_ORGANIZATION: 'innotegrity'
  SONARQUBE_PROJECT_KEY: 'innotegrity_go-mod-xerrors'
  SONARQUBE_SOURCE_DIR: '.'

  # tool specific variables
  GO_VERSION: '1.25'
  GOLANGCI_LINT_VERSION: 'v2.11.4'

  # action specific variables
  CHECKOUT_ACTION_REF: 'de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2
  SETUP_GO_ACTION_REF: '4a3601121dd01d1626a1e23e37211e3254c1c06c' # v6.4.0
  GOLANGCI_LINT_ACTION_REF: '1e7e51e771db61008b38414a730f564565cf7c20' # v9.2.0
  MARKDOWNLINT_ACTION_REF: 'ce4853d43830c74c1753b39f3cf40f71c2031eb9' # v23.0.0
  SONARQUBE_SCAN_ACTION_REF: '299e4b793aaa83bf2aba7c9c14bedbb485688ec4' # v7.1.0
  SONARQUBE_QUALITY_GATE_ACTION_REF: 'cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b' # v1.2.0

jobs:
  golangci-lint:
    name: Run golangci-lint checks
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@${{ env.CHECKOUT_ACTION_REF }}
      - name: Set up Go
        uses: actions/setup-go@${{ env.SETUP_GO_ACTION_REF }}
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run golangci-lint checks
        uses: golangci/golangci-lint-action@${{ env.GOLANGCI_LINT_ACTION_REF }}
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
  markdownlint:
    name: Run markdownlint checks
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@${{ env.CHECKOUT_ACTION_REF }}
      - name: Set up Go
        uses: actions/setup-go@${{ env.SETUP_GO_ACTION_REF }}
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run markdownlint checks
        uses: DavidAnson/markdownlint-cli2-action@${{ env.MARKDOWNLINT_ACTION_REF }}

  sonarqube:
    needs: [golangci-lint, markdownlint]
    name: Run SonarQube quality analysis
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@${{ env.CHECKOUT_ACTION_REF }}
        with:
          fetch-depth: 0 # required for better SonarQube analysis
      - name: Set up Go
        uses: actions/setup-go@${{ env.SETUP_GO_ACTION_REF }}
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run Tests
        run: go test -v -coverprofile=coverage.out -coverpkg=./... -covermode=atomic ./...
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@${{ env.SONARQUBE_SCAN_ACTION_REF }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ env.SONARQUBE_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONARQUBE_PROJECT_KEY }}
            -Dsonar.sources=${{ env.SONARQUBE_SOURCE_DIR }}
            -Dsonar.go.coverage.reportPaths=coverage.out
            -Dsonar.coverage.exclusions=**/*_test.go
      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@${{ env.SONARQUBE_QUALITY_GATE_ACTION_REF }}
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  ci-success:
    name: All CI Checks Passed
    needs: [golangci-lint, markdownlint, sonarqube]
    runs-on: ubuntu-latest
    if: always() # ensures this job always runs, even if others fail
    steps:
      - name: Check Statuses
        # fails if any job in 'needs' did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
